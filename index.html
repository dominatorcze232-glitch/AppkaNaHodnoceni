<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Školní Systém - Známky</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .app-container { width: 100%; max-width: 500px; background: #fff; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: #1a73e8; color: white; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; }
        
        #login-section { padding: 50px 20px; text-align: center; }
        .hidden { display: none !important; }

        /* Styl výpisu známek */
        #messages-container { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; display: flex; flex-direction: column; gap: 12px; }
        .grade-card { background: white; padding: 15px; border-radius: 10px; border-left: 6px solid #1a73e8; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .grade-number { font-size: 20px; font-weight: bold; color: #d93025; }
        .info-text { display: block; margin-top: 5px; color: #5f6368; font-style: italic; }
        
        .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #999; cursor: pointer; font-size: 18px; }
        .delete-btn:hover { color: #d93025; }

        /* Admin formulář (Tabulka v appce) */
        .admin-form { padding: 20px; border-top: 1px solid #ddd; background: #fff; border-bottom: 2px solid #1a73e8; }
        .admin-form label { display: block; font-size: 12px; color: #1a73e8; font-weight: bold; margin-bottom: 4px; }
        .admin-form input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-send { background: #1a73e8; color: white; }
        .btn-cancel { background: #dadce0; color: #3c4043; }
        
        .plus-btn { background: #1a73e8; color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 35px; cursor: pointer; margin: 15px auto; display: block; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header" id="header-title">Školní Portál</div>

        <div id="login-section">
            <input type="password" id="password-input" placeholder="Zadejte heslo..." style="width: 80%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc;">
            <button class="btn btn-send" onclick="checkPassword()" style="width: 80%;">Vstoupit</button>
        </div>

        <div id="main-section" class="hidden" style="display: flex; flex-direction: column; height: 100%; overflow: hidden;">
            
            <div id="admin-controls" class="hidden">
                <button id="add-btn" class="plus-btn" onclick="toggleForm()">+</button>
                
                <div id="grade-form" class="admin-form hidden">
                    <label>ZNÁMKA:</label>
                    <input type="text" id="grade-val" placeholder="Např. 1, 2+, Malá 3...">
                    
                    <label>INFORMACE / PŘEDMĚT:</label>
                    <input type="text" id="info-val" placeholder="Např. Matematika - test">
                    
                    <div class="btn-group">
                        <button class="btn btn-cancel" onclick="toggleForm()">Zrušit</button>
                        <button class="btn btn-send" onclick="sendGrade()">Potvrdit známku</button>
                    </div>
                </div>
            </div>

            <div id="messages-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYub0TMKRTTzo4JZgPngG4aHLEkEBvwfs",
            authDomain: "skola-4d7ac.firebaseapp.com",
            databaseURL: "https://skola-4d7ac-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "skola-4d7ac",
            storageBucket: "skola-4d7ac.firebasestorage.app",
            messagingSenderId: "107281183940",
            appId: "1:107281183940:web:91cee1374e1bece4150591",
            measurementId: "G-ZC8W1V9XKM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let role = "";

        window.checkPassword = function() {
            const pass = document.getElementById('password-input').value;
            if (pass === "6852") {
                role = "admin";
                start("Administrace");
            } else if (pass === "123") {
                role = "student";
                start("Moje Známky");
            } else {
                alert("Neplatné heslo!");
            }
        };

        function start(title) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('header-title').innerText = title;
            if (role === "admin") document.getElementById('admin-controls').classList.remove('hidden');
            loadGrades();
        }

        window.toggleForm = function() {
            document.getElementById('grade-form').classList.toggle('hidden');
            document.getElementById('add-btn').classList.toggle('hidden');
        };

        window.sendGrade = function() {
            const grade = document.getElementById('grade-val').value;
            const info = document.getElementById('info-val').value;

            if (!grade || !info) return alert("Vyplňte známku i informaci!");

            push(ref(db, 'grades/'), {
                grade: grade,
                info: info,
                date: new Date().toLocaleDateString()
            });

            document.getElementById('grade-val').value = "";
            document.getElementById('info-val').value = "";
            toggleForm();
        };

        window.deleteGrade = function(id) {
            if(confirm("Smazat tuto známku ze systému?")) remove(ref(db, 'grades/' + id));
        };

        function loadGrades() {
            onValue(ref(db, 'grades/'), (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).reverse().forEach(id => {
                        const item = data[id];
                        const card = document.createElement('div');
                        card.className = 'grade-card';
                        card.innerHTML = `
                            <div>
                                <strong>Známka:</strong> <span class="grade-number">${item.grade}</span><br>
                                <strong>Informace:</strong> <span class="info-text">${item.info}</span>
                                <small style="color:#aaa; font-size:10px;">${item.date || ''}</small>
                            </div>
                            ${role === 'admin' ? `<button class="delete-btn" onclick="deleteGrade('${id}')">🗑️</button>` : ""}
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = "<p style='text-align:center; color:gray;'>Zatím nebyly uděleny žádné známky.</p>";
                }
            });
        }
    </script>
</body>
</html>
