<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ČLVA - Admin & Space System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* UI a Menu */
        #ui-layer { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        .window { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 25, 0.95); border: 2px solid #00d4ff; padding: 20px;
            color: white; display: none; min-width: 300px; z-index: 100; border-radius: 8px;
        }

        /* Admin Ikona */
        #admin-icon {
            position: absolute; top: 10px; right: 10px; font-size: 30px;
            cursor: pointer; background: #333; padding: 5px 12px; border-radius: 50%;
        }

        button { background: #00d4ff; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; margin: 5px; border-radius: 4px; }
        button.danger { background: #ff4444; }
        input { padding: 8px; margin: 5px; width: 80%; }
        
        .user-row { border-bottom: 1px solid #444; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .grade-item { background: #222; margin: 5px 0; padding: 5px; border-radius: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1>Mince: <span id="coin-count">0</span></h1>
</div>

<div id="admin-icon" onclick="toggleWindow('admin-panel')">✏️</div>

<div id="admin-panel" class="window">
    <h2>Správa uživatelů</h2>
    <div id="user-list"></div>
    <hr>
    <h3>Udělit známku</h3>
    <input type="text" id="grade-target" placeholder="ID uživatele">
    <input type="number" id="grade-value" placeholder="Známka (1-5)" min="1" max="5">
    <input type="text" id="grade-info" placeholder="Informace (předmět...)">
    <button onclick="sendGrade()">Odeslat známku</button>
    <br>
    <button onclick="toggleWindow('admin-panel')">Zavřít</button>
</div>

<div id="grades-view" class="window">
    <h2>Známky uživatele: <span id="view-user-name"></span></h2>
    <div id="grades-list"></div>
    <button onclick="toggleWindow('grades-view')">Zavřít</button>
</div>

<div id="shop-menu" class="window">
    <h2>Nabídka ČLVA</h2>
    <p>Satelit: <span id="price-tag">Zdarma</span></p>
    <button id="buy-btn">Koupit a vypustit</button>
    <button onclick="toggleWindow('shop-menu')">Zavřít</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect, update, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAYA_Y3SpzdwQNklKFoa3HZiJPT8kxqjO8",
        authDomain: "multiplayer-cf14f.firebaseapp.com",
        projectId: "multiplayer-cf14f",
        storageBucket: "multiplayer-cf14f.firebasestorage.app",
        messagingSenderId: "1042297372152",
        appId: "1:1042297372152:web:16b94ab1e9277337d52a0d",
        measurementId: "G-7V3WJ6MS7S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    document.body.appendChild(canvas);

    let w, h;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.onresize = resize;
    resize();

    const myId = "Player_" + Math.random().toString(36).substring(7);
    let myPos = { x: 100, y: h - 70, id: myId };
    let coins = 0;
    let satellitesOwned = 0;
    let otherPlayers = {};
    let activeSatellites = [];

    const playerRef = ref(db, 'players/' + myId);
    set(playerRef, myPos);
    onDisconnect(playerRef).remove();

    // Funkce pro okna
    window.toggleWindow = (id) => {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    };

    // Smazání účtu (hráče)
    window.deleteUser = (id) => {
        remove(ref(db, 'players/' + id));
        remove(ref(db, 'grades/' + id));
    };

    // Zobrazení známek
    window.viewGrades = (id) => {
        document.getElementById('view-user-name').innerText = id;
        onValue(ref(db, 'grades/' + id), (snapshot) => {
            const list = document.getElementById('grades-list');
            list.innerHTML = "";
            const data = snapshot.val();
            for (let key in data) {
                const g = data[key];
                list.innerHTML += `<div class="grade-item">
                    <span><b>${g.value}</b> - ${g.info}</span>
                    <button class="danger" onclick="deleteGrade('${id}', '${key}')">X</button>
                </div>`;
            }
        });
        toggleWindow('grades-view');
    };

    window.deleteGrade = (userId, gradeId) => {
        remove(ref(db, `grades/${userId}/${gradeId}`));
    };

    window.sendGrade = () => {
        const target = document.getElementById('grade-target').value;
        const val = document.getElementById('grade-value').value;
        const info = document.getElementById('grade-info').value;
        if (!target || !val) return alert("Vyplň ID a známku!");

        push(ref(db, 'grades/' + target), { value: val, info: info });
        alert("Známka odeslána!");
    };

    // Sledování hráčů pro admin seznam
    onValue(ref(db, 'players'), (snapshot) => {
        otherPlayers = snapshot.val() || {};
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        for (let id in otherPlayers) {
            list.innerHTML += `
                <div class="user-row">
                    <span>${id}</span>
                    <div>
                        <button onclick="viewGrades('${id}')">Známky</button>
                        <button class="danger" onclick="deleteUser('${id}')">Smazat</button>
                    </div>
                </div>`;
        }
        // Pokud admin smaže MĚ, refreshnu stránku (simulace smazání účtu)
        if (!otherPlayers[myId]) location.reload();
    });

    // --- Zbytek herní logiky ---
    const keys = {};
    window.onkeydown = e => {
        keys[e.key] = true;
        if(e.key === 'e' || e.key === 'E') {
             if (myPos.x > w - 300) toggleWindow('shop-menu');
        }
    };
    window.onkeyup = e => keys[e.key] = false;

    document.getElementById('buy-btn').onclick = () => {
        const price = satellitesOwned === 0 ? 0 : 200;
        if (coins >= price) {
            coins -= price;
            satellitesOwned++;
            activeSatellites.push({ x: w - 150, y: h - 150, stage: 'launch' });
            if(satellitesOwned === 1) setInterval(() => { coins += 5; }, 1000);
            toggleWindow('shop-menu');
        }
    };

    function draw() {
        ctx.clearRect(0, 0, w, h);
        
        // Obloha a Vesmír
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#000'); grad.addColorStop(0.4, '#000033'); grad.addColorStop(0.8, '#87CEEB');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);

        // Měsíc
        ctx.fillStyle = "#EEE"; ctx.beginPath(); ctx.arc(w * 0.2, 100, 30, 0, 7); ctx.fill();

        // Tráva
        ctx.fillStyle = "#2d5a27"; ctx.fillRect(0, h - 50, w, 50);

        // Budova
        ctx.fillStyle = "#444"; ctx.fillRect(w - 250, h - 200, 200, 150);
        ctx.fillStyle = "white"; ctx.font = "bold 16px Arial";
        ctx.fillText("ČLVA", w - 170, h - 140);
        ctx.font = "10px Arial"; ctx.fillText("Česká letecká vesmírná agentura", w - 240, h - 120);

        // Pohyb a vykreslení hráčů
        if (keys['ArrowLeft'] || keys['a']) myPos.x -= 5;
        if (keys['ArrowRight'] || keys['d']) myPos.x += 5;
        update(playerRef, { x: myPos.x });

        ctx.fillStyle = "red"; ctx.fillRect(myPos.x, myPos.y, 30, 30);
        ctx.fillStyle = "white"; ctx.font = "10px Arial"; ctx.fillText("JÁ", myPos.x, myPos.y - 5);

        for (let id in otherPlayers) {
            if (id !== myId) {
                ctx.fillStyle = "blue";
                ctx.fillRect(otherPlayers[id].x, otherPlayers[id].y, 30, 30);
                ctx.fillStyle = "white";
                ctx.fillText(id, otherPlayers[id].x, otherPlayers[id].y - 5);
            }
        }

        // Satelity
        activeSatellites.forEach(s => {
            if (s.stage === 'launch') { s.y -= 3; if (s.y < 150) s.stage = 'orbit'; }
            else { s.x += Math.sin(Date.now()/1000); }
            ctx.fillStyle = "silver"; ctx.fillRect(s.x, s.y, 15, 10);
        });

        document.getElementById('coin-count').innerText = coins;
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
